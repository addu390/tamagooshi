name: website

on:
  push:
    branches: [main]
    paths: [website/**, .github/workflows/website.yml]
  workflow_run:
    workflows: [firmware]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
        working-directory: website
      - run: npm run build
        working-directory: website
      - name: Mirror firmware images from the latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view --repo ${{ github.repository }} >/dev/null 2>&1; then
            gh release download --repo ${{ github.repository }} --pattern '*.bin' --dir website/_site/firmware
          fi
      - uses: actions/upload-pages-artifact@v5
        with:
          path: website/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
