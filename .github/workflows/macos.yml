name: app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build app
        run: VERSION="${GITHUB_REF_NAME#v}" hub/macos/scripts/build.sh

      - name: Package DMG
        run: VERSION="${GITHUB_REF_NAME#v}" hub/macos/scripts/dmg.sh

      - uses: actions/upload-artifact@v4
        with:
          name: tamagooshi-dmg
          path: build/Tamagooshi-*.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Tamagooshi-*.dmg
