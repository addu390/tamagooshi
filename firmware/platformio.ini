[platformio]
default_envs = m5sticks3

[env]
extra_scripts = pre:tools/prebuild.py
lib_extra_dirs =
    lib/wire
    lib/ui
    lib/network
lib_ignore =
    wire
    ui
    network

[flags]
common =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
    -DTAMA_FW_VERSION=\"0.1.0\"
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -I include
    -I lib

[device]
; https://github.com/espressif/esp-idf/issues/18621
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21-2/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize
build_src_filter = +<*> -<simulator/>
build_unflags = -std=gnu++11
lib_deps =
    m5stack/M5Unified@^0.2.16
    bblanchon/ArduinoJson@^7.4.3
    h2zero/NimBLE-Arduino@^2.5.0
    bertmelis/espMqttClient@^1.7.3

[esp32]
extends = device
board = m5stick-c
board_build.variant = m5stack_stickc_plus
board_build.flash_size = 4MB
custom_sdkconfig =
    CONFIG_ESP_WIFI_IRAM_OPT=n
    CONFIG_ESP_WIFI_RX_IRAM_OPT=n
custom_component_remove =
    espressif/esp-modbus
    espressif/esp_rainmaker
    espressif/rmaker_common
    espressif/esp_insights
    espressif/esp_diag_data_store
    espressif/esp_diagnostics
    espressif/cbor
    espressif/qrcode
board_upload.flash_size = 4MB
board_build.partitions = partitions.csv

[esp32s3]
extends = device
board = esp32-s3-devkitc-1
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.partitions = partitions_8mb.csv
board_build.arduino.memory_type = qio_opi

[env:m5stickc-plus]
extends = esp32
build_flags =
    ${flags.common}
    -DTAMA_BOARD_M5STICKC_PLUS

[env:m5stickc-plus-se]
extends = esp32
build_flags =
    ${flags.common}
    -DTAMA_BOARD_M5STICKC_PLUS_SE

[env:m5sticks3]
extends = esp32s3
build_flags =
    ${flags.common}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -DTAMA_BOARD_M5STICKS3

[env:native_sim]
platform = native
build_type = debug
build_src_filter = -<*> +<simulator/>
lib_ignore =
    wire
    ui
    network
lib_deps =
    m5stack/M5Unified@^0.2.16
    bblanchon/ArduinoJson@^7.4.3
build_flags =
    -xc++ -std=c++17 -O0
    -DTAMA_FW_VERSION=\"0.1.0-sim\"
    -DTAMA_BOARD_M5STICKC_PLUS
    -DM5GFX_BOARD=board_M5StickCPlus
    -DM5GFX_SCALE=2
    -DM5GFX_ROTATION=0
    -lSDL2
    -I include
    -I lib
    -I"${sysenv.HOMEBREW_PREFIX}/include/SDL2"
    -L"${sysenv.HOMEBREW_PREFIX}/lib"
