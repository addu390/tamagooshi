<svg xmlns="http://www.w3.org/2000/svg" width="920" height="470" viewBox="0 0 920 470" role="img" aria-label="Tamagooshi architecture overview">
  <style>
    :root {
      --ink: #e4e4e7;
      --soft: #a1a1aa;
      --muted: #6b7280;
      --border: #30363d;
      --strong: #484f58;
      --panel: rgba(228, 228, 231, 0.02);
      --fill: rgba(228, 228, 231, 0.05);
      --hole: #0d1117;
      --term: #161b22;
      --term-line: #2e2e33;
      --term-soft: #3f3f46;
      --term-dim: #6b7280;
      --term-text: #9ca3af;
      --term-bright: #e4e4e7;
      --accent: #0e9f6e;
      --on-accent: #ffffff;
    }
    text { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .lbl { font-size: 9px; fill: var(--soft); }
    .chip { font-size: 7px; letter-spacing: .08em; fill: var(--muted); text-transform: uppercase; }
    .note { font-size: 8px; fill: var(--muted); }
    .cap { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 11.5px; fill: var(--soft); }
    .tkey { font-size: 9px; fill: var(--term-dim); }
    .tpath { font-size: 9px; fill: var(--term-bright); }
    .side { font-size: 8px; fill: var(--soft); }
    .sideh { font-size: 6.5px; letter-spacing: .09em; fill: var(--muted); }
    .row { font-size: 8px; fill: var(--soft); }
    .val { font-size: 7.5px; fill: var(--muted); }
    .cta { font-size: 7.5px; fill: var(--on-accent); }
    .panel { fill: var(--panel); stroke: var(--border); }
    .bar-t { fill: var(--fill); stroke: var(--border); }
    .bar { fill: var(--border); }
    .box { fill: var(--hole); stroke: var(--border); }
    .on { fill: var(--border); }
    .line { stroke: var(--strong); fill: none; }
    .grid { stroke: var(--border); }
    .dot { fill: var(--muted); }
    .px { fill: var(--ink); }
    .ok { fill: var(--accent); }
    .term { fill: var(--term); }
    .tbar { fill: var(--term-soft); }
    .pill { fill: var(--accent); }
  </style>
